name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Unit tests
        run: python -m pytest -q
      - name: Smoke import core modules
        run: python -c "import core_analysis, what_if_runner, report_builder, export_builder, ui_formatters; print('core modules import without Streamlit side effects')"
      - name: Docker build
        run: docker build .
